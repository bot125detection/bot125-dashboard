<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOT125 Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0f14;color:#e0e0e0;display:flex;min-height:100vh;background-image:url('data:image/png;base64,...');} /* background tetap sama */
    /* ... (semua style lama kamu tetap sama, saya tidak ubah) ... */
    .chart-container { position: relative; height: 160px; margin-top: 10px; }
    .log-list { max-height: 380px; overflow-y: auto; }
  </style>
</head>
<body>

<!-- Sidebar tetap sama -->

<div class="main">
  <div class="hero">
    <div>
      <h1>Selamat datang kembali, <span>Admin Whoisarlott!</span></h1>
      <p>Pantau aktivitas bot dan statistik server kamu.</p>
    </div>
    <div class="badge" id="bot-status"><div class="dot"></div> Mengecek...</div>
  </div>

  <div class="stats" style="grid-template-columns:repeat(5,minmax(0,1fr))">
    <!-- Stats tetap sama -->
  </div>

  <div class="row2">
    <!-- Bagian server dan broadcast tetap sama -->
  </div>

  <!-- === BAGIAN BARU: STATISTIK HARIAN + LOG === -->
  <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 15px;">
    <div class="card">
      <div class="card-title"><i class="ti ti-chart-bar"></i> Aktivitas Harian (7 Hari Terakhir)</div>
      <div class="chart-container">
        <canvas id="dailyChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-clock"></i> Log Aktivitas Terbaru</div>
      <div id="log-list" class="log-list"><div class="empty">Memuat...</div></div>
    </div>
  </div>

  <div class="row3">
    <!-- Pengaturan cepat, Blacklist, Banned Words tetap sama -->
  </div>

  <div class="card" style="margin-bottom:10px">
    <div class="card-title"><i class="ti ti-building-community"></i> Daftar Server</div>
    <div id="server-list"><div class="empty">Memuat...</div></div>
  </div>
</div>

<script>
  const API = 'https://bot125-detection-production.up.railway.app';
  const socket = io(API);

  let dailyChart;

  // Load Daily Chart
  async function loadDailyStats() {
    try {
      const res = await fetch(API + '/api/daily-stats');
      const data = await res.json();

      const ctx = document.getElementById('dailyChart');
      if (dailyChart) dailyChart.destroy();

      dailyChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.dates.map(d => d.slice(5)), // MM-DD
          datasets: [
            {
              label: 'Phishing / Hack',
              data: data.phishing,
              backgroundColor: '#f87171',
              borderColor: '#f87171',
              borderWidth: 1.5
            },
            {
              label: 'Scam Image',
              data: data.image,
              backgroundColor: '#60a5fa',
              borderColor: '#60a5fa',
              borderWidth: 1.5
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { color: '#c0c4d0', font: { size: 11 }, usePointStyle: true } }
          },
          scales: {
            y: { beginAtZero: true, grid: { color: '#1e2130' }, ticks: { color: '#5a5f72', stepSize: 1 } },
            x: { grid: { color: '#1e2130' }, ticks: { color: '#5a5f72' } }
          }
        }
      });
    } catch(e) {
      console.error("Gagal load daily stats", e);
    }
  }

  // Load Logs (lebih ringkas)
  function loadLogs() {
    fetch(API + '/api/logs')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('log-list');
        if (!data.length) {
          el.innerHTML = '<div class="empty">Belum ada aktivitas</div>';
          return;
        }

        el.innerHTML = data.slice(0, 15).map(log => {
          const time = new Date(log.created_at).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
          let pill = log.type === 'phishing' || log.type === 'timeout' 
            ? '<span class="pill p-red">HACK</span>' 
            : log.type === 'image' 
            ? '<span class="pill p-red">SCAM</span>' 
            : '<span class="pill p-yellow">HAPUS</span>';

          return `<div class="log-item">
            <div class="log-time">${time}</div>
            <div class="log-msg"><strong>@${log.username}</strong> — ${log.detail} ${pill}</div>
          </div>`;
        }).join('');
      });
  }

  // Socket realtime
  socket.on('new_log', () => {
    // Update stats & logs
    fetch(API + '/api/stats').then(r => r.json()).then(data => {
      document.getElementById('stat-deleted').textContent = data.deleted ?? 0;
      document.getElementById('stat-phishing').textContent = data.phishing ?? 0;
      document.getElementById('stat-image').textContent = data.image ?? 0;
      document.getElementById('stat-timeout').textContent = data.timeout ?? 0;
    });
    loadLogs();
    loadDailyStats();
  });

  // Load semua data
  function initDashboard() {
    loadBlacklist();
    loadBannedWords();
    loadLogs();
    loadDailyStats();
    loadServers();
  }

  // Auto refresh
  setInterval(() => {
    loadLogs();
    loadDailyStats();
  }, 30000);

  window.onload = initDashboard;
</script>
</body>
</html>
